    sha256 = f573e073251032eff8245a7ff04ec88f08a624105748f986b822af43dbaeddce
    extract = tar
    extract_path = verible-v0.0-4080-ga0a8d8eb/bin/verible-verilog-format
    [verible-verilog-format.exe]
