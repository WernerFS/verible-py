name: main

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run the hooks against a sample file
        shell: bash
        run: |
          printf 'module sample;\nendmodule\n' > sample.sv
          pre-commit try-repo . verible-verilog-lint --files sample.sv
          pre-commit try-repo . verible-verilog-format --files sample.sv
